<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>拾月 Blossom · UI Redesign Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap');

  :root {
    --pink: #FCAEC1;
    --pink-light: #FCD1DB;
    --lavender: #B7A8D6;
    --sky: #ADD9F3;
    --bg-gradient: linear-gradient(165deg, #FDF0F4 0%, #F4E8F8 40%, #EAF0FC 100%);
    --card-bg: rgba(255,255,255,0.75);
    --card-border: rgba(255,255,255,0.9);
    --card-shadow: 0 4px 24px rgba(183,168,214,0.12);
    --text-dark: #2D2440;
    --text-mid: #6B5F80;
    --text-light: #9B91AE;
    --accent: #C192D4;
    --accent-dark: #9B6FB0;
    --success: #7BC4A0;
    --btn-gradient: linear-gradient(135deg, #C192D4, #9B6FB0);
    --ring-pink: #FCAEC1;
    --ring-lavender: #B7A8D6;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f5f0f8; font-family:'Nunito',sans-serif; display:flex; flex-wrap:wrap; justify-content:center; gap:48px; padding:48px 24px; }

  .screen-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .screen-label { font-size:13px; color:#9B91AE; font-weight:600; letter-spacing:0.5px; }

  .phone {
    width:375px; height:812px; border-radius:44px; overflow:hidden;
    position:relative;
    box-shadow: 0 24px 80px rgba(45,36,64,0.15), 0 0 0 1px rgba(255,255,255,0.6);
  }

  .status-bar {
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 28px 0; height:54px;
    font-size:14px; font-weight:600; color:var(--text-dark);
  }

  /* ── HOME PAGE ── */
  .home-bg {
    background: var(--bg-gradient);
    height:100%; padding:0 20px 20px;
    display:flex; flex-direction:column;
  }

  .greeting { margin-top:8px; margin-bottom:20px; }
  .greeting-date { font-size:13px; color:var(--text-light); font-weight:500; }
  .greeting-text { font-family:'Playfair Display',serif; font-size:24px; font-weight:600; color:var(--text-dark); margin-top:2px; }

  .countdown-card {
    background: linear-gradient(135deg, var(--pink-light) 0%, var(--lavender) 100%);
    border-radius:24px; padding:28px 24px 22px; text-align:center;
    box-shadow: 0 8px 32px rgba(252,174,193,0.2);
    margin-bottom:20px; position:relative; overflow:hidden;
  }
  .countdown-card::before {
    content:''; position:absolute; top:-40px; right:-40px;
    width:120px; height:120px; border-radius:50%;
    background: rgba(255,255,255,0.15);
  }
  .countdown-card::after {
    content:''; position:absolute; bottom:-30px; left:-20px;
    width:80px; height:80px; border-radius:50%;
    background: rgba(255,255,255,0.1);
  }
  .week-badge {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.3); border-radius:100px;
    padding:5px 14px; font-size:12px; font-weight:600; color:white;
    backdrop-filter:blur(8px); margin-bottom:12px;
  }
  .countdown-label { font-size:14px; color:rgba(255,255,255,0.85); font-weight:500; }
  .countdown-num { font-family:'Playfair Display',serif; font-size:64px; font-weight:700; color:white; line-height:1.1; margin:4px 0; text-shadow:0 2px 12px rgba(0,0,0,0.08); }
  .countdown-unit { font-size:16px; color:rgba(255,255,255,0.8); font-weight:600; }
  .due-date { font-size:12px; color:rgba(255,255,255,0.7); margin-top:8px; }

  .task-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
    margin-bottom:16px;
  }
  .task-card {
    background:var(--card-bg); backdrop-filter:blur(16px);
    border:1px solid var(--card-border); border-radius:18px;
    padding:16px; cursor:pointer;
    transition:transform 0.2s, box-shadow 0.2s;
    box-shadow: var(--card-shadow);
  }
  .task-card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(183,168,214,0.18); }
  .task-icon { width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; font-size:18px; }
  .task-name { font-size:14px; font-weight:700; color:var(--text-dark); margin-bottom:3px; }
  .task-desc { font-size:11px; color:var(--text-light); line-height:1.4; }

  .progress-card {
    background:var(--card-bg); backdrop-filter:blur(16px);
    border:1px solid var(--card-border); border-radius:18px;
    padding:16px 18px; box-shadow:var(--card-shadow);
  }
  .progress-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .progress-title { font-size:13px; font-weight:700; color:var(--text-dark); }
  .progress-count { font-size:13px; font-weight:600; color:var(--accent); }
  .progress-bar { height:6px; background:rgba(183,168,214,0.15); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--btn-gradient); border-radius:3px; width:24%; }

  .bottom-nav {
    margin-top:auto; display:flex; justify-content:space-around;
    padding:10px 0 28px; background:rgba(255,255,255,0.5);
    backdrop-filter:blur(20px);
    border-top:1px solid rgba(255,255,255,0.6);
  }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; color:var(--text-light); font-weight:600; }
  .nav-item.active { color:var(--accent-dark); }

  /* ── KEGEL TIMER ── */
  .kegel-bg {
    background: linear-gradient(160deg, #FCD1DB 0%, #C192D4 50%, #9B6FB0 100%);
    height:100%; padding:0 20px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; position:relative;
  }
  .kegel-bg::before {
    content:''; position:absolute; top:60px; left:-40px;
    width:200px; height:200px; border-radius:50%;
    background:rgba(255,255,255,0.06);
  }
  .kegel-bg::after {
    content:''; position:absolute; bottom:80px; right:-60px;
    width:250px; height:250px; border-radius:50%;
    background:rgba(255,255,255,0.04);
  }

  .kegel-level { font-size:13px; color:rgba(255,255,255,0.7); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
  .kegel-phase { font-size:18px; color:white; font-weight:700; margin-bottom:32px; }

  .timer-ring {
    width:220px; height:220px; border-radius:50%;
    background: conic-gradient(rgba(255,255,255,0.9) 0deg, rgba(255,255,255,0.9) 216deg, rgba(255,255,255,0.15) 216deg);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:28px; position:relative;
    box-shadow: 0 0 40px rgba(252,174,193,0.3);
  }
  .timer-inner {
    width:196px; height:196px; border-radius:50%;
    background: linear-gradient(160deg, rgba(252,209,219,0.4), rgba(155,111,176,0.4));
    backdrop-filter:blur(20px);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
  }
  .timer-num { font-family:'Playfair Display',serif; font-size:56px; font-weight:700; color:white; text-shadow:0 2px 12px rgba(0,0,0,0.1); }
  .timer-label { font-size:13px; color:rgba(255,255,255,0.7); margin-top:4px; }

  .kegel-sets { font-size:14px; color:rgba(255,255,255,0.7); margin-bottom:32px; }

  .kegel-btns { display:flex; gap:16px; }
  .kegel-btn {
    padding:14px 36px; border-radius:16px; font-size:15px; font-weight:700;
    border:none; cursor:pointer; letter-spacing:0.5px;
  }
  .kegel-btn-pause { background:rgba(255,255,255,0.2); color:white; backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.3); }
  .kegel-btn-stop { background:white; color:var(--accent-dark); box-shadow:0 4px 16px rgba(0,0,0,0.1); }

  /* ── COMPLETE PAGE ── */
  .complete-bg {
    background: linear-gradient(160deg, #FCD1DB 0%, #B7A8D6 60%, #ADD9F3 100%);
    height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:0 32px; position:relative;
  }
  .complete-check {
    width:80px; height:80px; border-radius:50%;
    background:rgba(255,255,255,0.25); backdrop-filter:blur(12px);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:24px; border:2px solid rgba(255,255,255,0.4);
  }
  .complete-title { font-family:'Playfair Display',serif; font-size:28px; font-weight:700; color:white; margin-bottom:8px; }
  .complete-sub { font-size:15px; color:rgba(255,255,255,0.8); line-height:1.5; margin-bottom:40px; }
  .complete-btn {
    background:white; color:var(--accent-dark); padding:16px 48px;
    border-radius:16px; font-size:16px; font-weight:700; border:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.1); cursor:pointer;
  }
</style>
</head>
<body>

<!-- ① HOME -->

  <div class="phone">

<!-- ② KEGEL TIMER -->

  <div class="phone">
